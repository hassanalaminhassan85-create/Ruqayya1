# Configuration for Cloudflare Pages
name = "ruqayya-transport-erp"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-07"
compatibility_flags = [ "nodejs_compat" ]

[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "e4dfd23b21c349c48f5c9fe0825970e0"

[[d1_databases]]
binding = "DB"
database_name = "ruqayya"
database_id = "2e4092ba-4766-45d4-bb5d-934d6bbac2e6"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ruqayya"

[ai]
binding = "AI"

[vars]
# GEMINI_API_KEY: Required for Gemini AI fallback models (e.g. if Workers AI binding is not configured)
GEMINI_API_KEY = "your_gemini_api_key_here"
# VAPID Keys: Required for Web Push Notification Delivery (defaults are hardcoded in backend)
VAPID_PUBLIC_KEY = ""
VAPID_PRIVATE_KEY = ""
# Cloudflare API Credentials: Required if using REST API fallback for Workers AI
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_API_TOKEN = ""

